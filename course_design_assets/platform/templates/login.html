<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Microsoft YaHei", Arial, sans-serif;
      background:
        linear-gradient(rgba(20, 60, 30, 0.36), rgba(20, 60, 30, 0.36)),
        url("/image/麦子图.jpg") center center / cover no-repeat;
      background-color: #2c8b49;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }
    .wrap {
      width: min(980px, 94vw);
      display: grid;
      grid-template-columns: minmax(460px, 560px) 360px;
      gap: 22px;
      align-items: center;
      padding: 0 8px;
    }
    .intro {
      background: rgba(37, 133, 70, 0.90);
      border-radius: 16px;
      padding: 34px 34px 30px;
      max-width: 560px;
      margin-left: 0;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.18);
    }
    .intro h1 { margin: 0 0 8px; font-size: 40px; font-weight: 800; line-height: 1.1; }
    .intro h2 { margin: 0 0 18px; font-size: 46px; font-weight: 900; line-height: 1.1; white-space: nowrap; }
    .intro p { margin: 0 0 18px; opacity: 0.96; font-size: 20px; line-height: 1.45; }
    .intro ul { list-style: none; padding: 0; margin: 0; }
    .intro li { margin-bottom: 10px; opacity: 0.98; font-size: 20px; line-height: 1.4; }
    .card {
      background: #fff;
      color: #2d3d2d;
      border-radius: 14px;
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.14);
      padding: 24px;
    }
    .card h3 { margin: 0 0 6px; color: #175d35; }
    .tip { font-size: 13px; color: #6e7f6e; margin-bottom: 14px; }
    .input {
      width: 100%;
      border: 1px solid #d5e3d7;
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 10px;
      font-size: 14px;
    }
    .btn {
      width: 100%;
      border: none;
      border-radius: 8px;
      background: #2d8a4b;
      color: #fff;
      padding: 11px 0;
      font-weight: 700;
      cursor: pointer;
    }
    .btn:hover { background: #267741; }
    .msg { min-height: 20px; font-size: 13px; margin-top: 8px; color: #c62828; }
    .foot { margin-top: 10px; text-align: center; font-size: 13px; color: #647764; }
    .foot a { color: #1e7a41; text-decoration: none; font-weight: 700; }
    .remember-line {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      color: #5d705d;
      margin: 4px 0 10px;
    }
    .remember-line a { color: #1e7a41; text-decoration: none; font-weight: 700; }
    @media (max-width: 980px) {
      .wrap { grid-template-columns: 1fr; gap: 14px; }
      .intro { margin-left: 0; max-width: none; }
      .intro h2 { font-size: 42px; }
      .intro p, .intro li { font-size: 18px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="intro">
      <h2>农业病虫害智能识别系统</h2>
      <p>基于人工智能的农业病虫害识别与防治平台</p>

    </section>
    <section class="card">
      <h3>欢迎登录</h3>
      <div class="tip">登录后即可使用识别平台</div>
      <input id="username" class="input" placeholder="用户名">
      <input id="password" class="input" type="password" placeholder="请输入密码">
      <div class="remember-line">
        <label><input id="remember" type="checkbox" checked> 7天内免登录</label>
        <a href="/reset-password">忘记密码？</a>
      </div>
      <button id="loginBtn" class="btn">登 录</button>
      <div id="msg" class="msg"></div>
      <div class="foot">还没有账号？<a href="/register">立即注册</a></div>
    </section>
  </div>

  <script>
    const msg = document.getElementById("msg");
    document.getElementById("loginBtn").addEventListener("click", async () => {
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();
      const remember = document.getElementById("remember").checked;
      msg.style.color = "#c62828";
      if (!username || !password) {
        msg.textContent = "请输入用户名和密码";
        return;
      }
      const res = await fetch("/api/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password, remember }),
      });
      const data = await res.json();
      if (!res.ok || !data.ok) {
        msg.textContent = data.message || "登录失败";
        return;
      }
      msg.style.color = "#1f7f3f";
      msg.textContent = "登录成功，正在跳转...";
      setTimeout(() => { window.location.href = "/"; }, 500);
    });
  </script>
</body>
</html>
