<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>注册</title>
  <style>
    * { box-sizing: border-box; }
    .layout { display: grid; grid-template-columns: 190px 1fr; min-height: 100vh; }
    .sidebar { background: rgba(244,248,244,.95); border-right: 1px solid #dfe8df; padding: 12px 10px; }
    .menu-title { color: #2f6b4d; font-weight: 700; font-size: 14px; padding: 8px 10px; }
    .menu-item { display: block; padding: 10px 12px; margin: 5px 0; border-radius: 8px; color: #4d6554; text-decoration: none; font-size: 13px; }
    .menu-item:hover { background: #e7f1ea; color: #2f6b4d; }
    .menu-item.active { background: #ddefe4; color: #2f6b4d; font-weight: 700; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Microsoft YaHei", Arial, sans-serif;
      background:
        linear-gradient(rgba(20, 60, 30, 0.34), rgba(20, 60, 30, 0.34)),
        url("/image/麦子图.jpg") center center / cover no-repeat;
      background-color: #2c8b49;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }
    .wrap {
      width: min(960px, 94vw);
      display: grid;
      grid-template-columns: minmax(420px, 560px) 360px;
      gap: 24px;
      align-items: center;
      padding: 0 8px;
    }
    .intro {
      background: rgba(37, 133, 70, 0.90);
      border-radius: 16px;
      padding: 34px 34px 30px;
      max-width: 620px;
      margin-left: 0;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.18);
    }
    .intro h1 {
      margin: 0 0 8px;
      font-size: 40px;
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: 0.3px;
    }
    .intro h2 {
      margin: 0 0 18px;
      font-size: 56px;
      font-weight: 900;
      line-height: 1.1;
      letter-spacing: 0.5px;
    }
    .intro p { margin: 0 0 18px; opacity: 0.96; font-size: 20px; line-height: 1.45; }
    .intro ul { list-style: none; padding: 0; margin: 0; }
    .intro li { margin-bottom: 10px; opacity: 0.98; font-size: 20px; line-height: 1.4; }
    .card {
      background: #fff;
      color: #2d3d2d;
      border-radius: 14px;
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.14);
      padding: 24px;
    }
    .card h3 { margin: 0 0 6px; color: #175d35; }
    .tip { font-size: 13px; color: #6e7f6e; margin-bottom: 14px; }
    .input {
      width: 100%;
      border: 1px solid #d5e3d7;
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 10px;
      font-size: 14px;
    }
    .btn {
      width: 100%;
      border: none;
      border-radius: 8px;
      background: #2d8a4b;
      color: #fff;
      padding: 11px 0;
      font-weight: 700;
      cursor: pointer;
    }
    .btn:hover { background: #267741; }
    .msg { min-height: 20px; font-size: 13px; margin-top: 8px; color: #c62828; }
    .foot { margin-top: 10px; text-align: center; font-size: 13px; color: #647764; }
    .foot a { color: #1e7a41; text-decoration: none; font-weight: 700; }
    @media (max-width: 980px) {
      .wrap {
        grid-template-columns: 1fr;
        gap: 14px;
      }
      .intro {
        max-width: none;
        margin-left: 0;
      }
      .intro h2 {
        font-size: 42px;
      }
      .intro p,
      .intro li {
        font-size: 18px;
      }
    }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="menu-title">菜单</div>
      <a class="menu-item" href="/login">登录</a>
      <a class="menu-item active" href="/register">注册</a>
      <a class="menu-item" href="/reset-password">重置密码</a>
      <a class="menu-item" href="/">病害检测</a>
      <a class="menu-item" href="/model-info">模型信息</a>
    </aside>
    <main style="display:grid;place-items:center;">
  <div class="wrap">
    <section class="intro">
    
      <h2>农业病虫害智能识别系统</h2>
      <p>快速注册后即可体验你的模型识别平台</p>
      <ul>
        <li>• 个性化账户与历史数据隔离</li>
        <li>• 支持多模型识别流程</li>
        <li>• 支持可视化结果查询与分析</li>
        <li>• 面向农业场景的轻量部署</li>
      </ul>
    </section>
    <section class="card">
      <h3>创建账号</h3>
      <div class="tip">用户名至少 3 位，密码至少 6 位</div>
      <input id="username" class="input" placeholder="请输入用户名">
      <input id="password" class="input" type="password" placeholder="请输入密码">
      <input id="password2" class="input" type="password" placeholder="请再次输入密码">
      <button id="registerBtn" class="btn">注 册</button>
      <div id="msg" class="msg"></div>
      <div class="foot">已有账号？<a href="/login">去登录</a></div>
    </section>
  </div>
    </main>
  </div>

  <script>
    const msg = document.getElementById("msg");
    document.getElementById("registerBtn").addEventListener("click", async () => {
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();
      const password2 = document.getElementById("password2").value.trim();
      msg.style.color = "#c62828";

      if (!username || !password || !password2) {
        msg.textContent = "请完整填写信息";
        return;
      }
      if (password !== password2) {
        msg.textContent = "两次密码输入不一致";
        return;
      }

      const res = await fetch("/api/register", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password, remember: true }),
      });
      const data = await res.json();
      if (!res.ok || !data.ok) {
        msg.textContent = data.message || "注册失败";
        return;
      }
      msg.style.color = "#1f7f3f";
      msg.textContent = "注册成功，正在进入系统...";
      setTimeout(() => { window.location.href = "/"; }, 600);
    });
  </script>
</body>
</html>
