<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>找回密码</title>
  <style>
    body { margin: 0; min-height: 100vh; background: #f3f7f4; font-family: "Microsoft YaHei", Arial, sans-serif; }
    .layout { display: grid; grid-template-columns: 190px 1fr; min-height: 100vh; }
    .sidebar { background: #f4f8f4; border-right: 1px solid #dfe8df; padding: 12px 10px; }
    .menu-title { color: #2f6b4d; font-weight: 700; font-size: 14px; padding: 8px 10px; }
    .menu-item { display: block; padding: 10px 12px; margin: 5px 0; border-radius: 8px; color: #4d6554; text-decoration: none; font-size: 13px; }
    .menu-item:hover { background: #e7f1ea; color: #2f6b4d; }
    .menu-item.active { background: #ddefe4; color: #2f6b4d; font-weight: 700; }
    .main { min-width: 0; display: grid; place-items: center; }
    .top { position: fixed; left: 190px; right: 0; top: 0; height: 56px; background: #2f6b4d; color: #fff; display:flex; align-items:center; justify-content:space-between; padding:0 16px; }
    .top a { color:#fff; text-decoration:none; }
    .card { width: min(420px, 92vw); background: #fff; border-radius: 12px; padding: 22px; box-shadow: 0 10px 24px rgba(0,0,0,.12); }
    h2 { margin: 0 0 8px; color: #1f6a3d; }
    .tip { color: #708370; font-size: 13px; margin-bottom: 10px; }
    .input { width: 100%; border: 1px solid #d2dfd3; border-radius: 8px; padding: 10px 11px; margin-bottom: 10px; }
    .btn { width: 100%; border: none; border-radius: 8px; background: #2f8a52; color: #fff; padding: 10px 0; font-weight: 700; cursor: pointer; }
    .msg { min-height: 20px; margin-top: 8px; font-size: 13px; color: #c62828; }
    .foot { margin-top: 8px; font-size: 13px; color: #607260; text-align: center; }
    .foot a { color: #1f7a42; font-weight: 700; text-decoration: none; }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <a class="menu-item" href="/drone-decision">无人机决策</a>
      <div class="menu-title">菜单</div>
      <a class="menu-item" href="/">病害检测</a>
      <a class="menu-item" href="/model-info">模型信息</a>
      <a class="menu-item" href="/profile">个人中心</a>
      <a class="menu-item active" href="/reset-password">重置密码</a>
    </aside>
    <main class="main">
      <div class="top"><div>重置密码</div><div><a href="/">返回识别平台</a></div></div>
      <section class="card" style="margin-top:56px;">
    <h2>本地重置密码</h2>
    <div class="tip">输入用户名并设置新密码（本地重置方式）</div>
    <input id="username" class="input" placeholder="用户名">
    <input id="newPassword" class="input" type="password" placeholder="新密码（至少6位）">
    <input id="newPassword2" class="input" type="password" placeholder="确认新密码">
    <button id="resetBtn" class="btn">重置密码</button>
    <div id="msg" class="msg"></div>
    <div class="foot"><a href="/login">返回登录</a></div>
  </section>
    </main>
  </div>

  <script>
    const msg = document.getElementById("msg");
    document.getElementById("resetBtn").addEventListener("click", async () => {
      const username = document.getElementById("username").value.trim();
      const new_password = document.getElementById("newPassword").value.trim();
      const new_password2 = document.getElementById("newPassword2").value.trim();
      msg.style.color = "#c62828";
      if (!username || !new_password || !new_password2) {
        msg.textContent = "请完整填写信息";
        return;
      }
      if (new_password !== new_password2) {
        msg.textContent = "两次密码不一致";
        return;
      }
      const res = await fetch("/api/forgot-password", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, new_password }),
      });
      const data = await res.json();
      if (!res.ok || !data.ok) {
        msg.textContent = data.message || "重置失败";
        return;
      }
      msg.style.color = "#1f7f3f";
      msg.textContent = "重置成功，正在跳转登录...";
      setTimeout(() => { window.location.href = "/login"; }, 700);
    });
  </script>
</body>
</html>
